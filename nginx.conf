# ============================================================
# إعداد Nginx لموقع abdullahabdulkreem.com
# الحل الجذري لمشكلة عدم ظهور الصور المرفوعة
# ============================================================

# Upstream - التطبيق Node.js يعمل على port 5000
upstream nodejs_app {
    server 127.0.0.1:5000;
    keepalive 64;
}

# ====== HTTPS Server (الرئيسي) ======
server {
    listen 443 ssl;
    server_name abdullahabdulkreem.com www.abdullahabdulkreem.com;

    # ---- SSL (Certbot) ----
    ssl_certificate /etc/letsencrypt/live/abdullahabdulkreem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abdullahabdulkreem.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ---- إعدادات الأمان ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- حجم رفع الملفات (10MB) ----
    client_max_body_size 10M;
    client_body_timeout 60s;

    # ---- ✅ الحل: تمرير /uploads/ للتطبيق Node.js ----
    # هذا هو سبب المشكلة: Nginx كان يرفض الطلبات بدلاً من تمريرها
    location /uploads/ {
        proxy_pass http://nodejs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache الصور في المتصفح
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ---- ✅ تمرير رفع الملفات للتطبيق ----
    location /api/uploads/ {
        proxy_pass http://nodejs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # مهم: زيادة timeout لعمليات الرفع
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # السماح بحجم أكبر لعمليات الرفع
        client_max_body_size 50M;
    }

    # ---- تمرير جميع API routes للتطبيق ----
    location /api/ {
        proxy_pass http://nodejs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---- تمرير جميع الطلبات الأخرى (SPA routing) ----
    location / {
        proxy_pass http://nodejs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ---- Gzip Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}

# ====== HTTP → HTTPS Redirect ======
server {
    listen 80;
    server_name abdullahabdulkreem.com www.abdullahabdulkreem.com;
    return 301 https://$host$request_uri;
}
