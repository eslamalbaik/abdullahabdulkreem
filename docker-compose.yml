version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abdullah_portfolio
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # قم بتعريف هذه المتغيرات في ملف .env أو مباشرةً هنا
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE:-15m}
      - JWT_REFRESH_EXPIRE=${JWT_REFRESH_EXPIRE:-7d}
      - SESSION_SECRET=${SESSION_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - FROM_EMAIL=${FROM_EMAIL:-}
    volumes:
      # ✅ Volume دائم للصور المرفوعة - هذا يحل مشكلة فقدان الصور بعد كل deploy
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  # ✅ Named volume يضمن بقاء الصور حتى بعد إعادة بناء الـ container
  uploads_data:
    driver: local
