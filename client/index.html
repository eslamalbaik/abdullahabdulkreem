<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta property="og:title" content="إيلينا غريد - مصممة هوية بصرية" />
    <meta property="og:description" content="معرض أعمال، متجر، ودورات في تصميم العلامات التجارية." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="إيلينا غريد - مصممة هوية بصرية" />
    <meta name="twitter:description" content="معرض أعمال، متجر، ودورات في تصميم العلامات التجارية." />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preload" href="/fonts/TheYearofHandicrafts-Regular.otf" as="font" type="font/otf" crossorigin="anonymous" />
    <link rel="preload" href="/fonts/TheYearofHandicrafts-Bold.otf" as="font" type="font/otf" crossorigin="anonymous" />
    <style>
      @font-face {
        font-family: 'The Year of Handicrafts';
        src: url('/fonts/TheYearofHandicrafts-Regular.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'The Year of Handicrafts';
        src: url('/fonts/TheYearofHandicrafts-Bold.otf') format('opentype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      html, body, div, span, p, h1, h2, h3, h4, h5, h6, a, button, input, textarea, label, li, ul, ol, nav, header, footer, section, article, aside, main {
        font-family: 'The Year of Handicrafts', 'Arial', 'Tahoma', sans-serif !important;
      }
      * {
        font-family: inherit;
      }
    </style>
    <script>
      if ('fonts' in document) {
        Promise.all([
          document.fonts.load('400 1em "The Year of Handicrafts"'),
          document.fonts.load('700 1em "The Year of Handicrafts"')
        ]).then(function() {
          document.documentElement.classList.add('fonts-loaded');
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
